# Alembic configuration file.
# The database URL is NOT set here — it is injected at runtime by alembic/env.py
# via the DATABASE_URL environment variable.  No secrets are stored in this file.

[alembic]
# Path to the alembic/ directory (relative to this file).
script_location = alembic

# Template used when generating new migration scripts.
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps.
timezone = UTC

# Do not truncate migration output.
truncate_slug_length = 40

# Version path separator; "os" uses the OS default.
version_path_separator = os

# Prepend sys.path with these paths when running env.py.
prepend_sys_path = .

[post_write_hooks]
# Automatically run Ruff on freshly generated migration files.
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/../.venv/bin/ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
