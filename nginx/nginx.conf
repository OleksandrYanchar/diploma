# Nginx reverse proxy configuration for the Zero Trust financial platform.
#
# Security controls enforced at this boundary (Boundary 1: Public → Nginx):
#   - Rate limiting per IP on /api/auth/ endpoints (SR-15)
#   - Rate limiting per IP on all other /api/ endpoints (SR-15)
#   - Security headers on all responses (SR-19)
#   - Backend and Redis are NOT reachable except through this proxy
#
# This configuration is intentionally conservative.  TLS termination is
# noted but not configured here because the development environment uses
# HTTP.  In production, replace the :80 server block with :443 + SSL
# directives and add a redirect from :80 to :443.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide Nginx version from Server response header.
    server_tokens off;

    sendfile on;
    keepalive_timeout 65;

    # ------------------------------------------------------------------
    # Rate limiting zones (SR-15)
    #
    # Two zones are defined:
    #   auth_limit  — 10 requests/minute per IP for authentication endpoints.
    #                 This is the critical control against credential stuffing.
    #   api_limit   — 60 requests/minute per IP for all other API endpoints.
    #
    # Zone sizes: 10m allows ~160,000 unique IP state entries.
    # ------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=60r/m;

    # Return 429 (Too Many Requests) instead of Nginx's default 503.
    limit_req_status 429;

    # Log format including upstream response time for performance monitoring.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ------------------------------------------------------------------
    # Upstream: FastAPI backend
    # The hostname "backend" resolves via Docker's internal DNS.
    # ------------------------------------------------------------------
    upstream fastapi_backend {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # ------------------------------------------------------------------
        # Security headers (SR-19)
        # Applied to ALL responses from this server block.
        # ------------------------------------------------------------------

        # Prevent the page from being embedded in an iframe (clickjacking).
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME type sniffing.
        add_header X-Content-Type-Options "nosniff" always;

        # Legacy XSS filter hint for older browsers.
        add_header X-XSS-Protection "1; mode=block" always;

        # Control what referrer information is sent on cross-origin requests.
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Content Security Policy: default-src 'self' restricts all resource
        # loading to the same origin.  This will be tightened further in
        # Phase 8 when the frontend static assets are served.
        add_header Content-Security-Policy "default-src 'self'" always;

        # HSTS: tell browsers to use HTTPS only for the next year.
        # Included now (even without TLS) so it is already present when TLS
        # is added in production.  Browsers will enforce it once TLS is live.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ------------------------------------------------------------------
        # /api/v1/auth/* — authentication endpoints (stricter rate limit)
        # ------------------------------------------------------------------
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Propagate the rate-limit exceeded status back to the client.
            proxy_intercept_errors off;
        }

        # ------------------------------------------------------------------
        # /api/* — all other API endpoints
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ------------------------------------------------------------------
        # /docs, /redoc, /openapi.json — FastAPI interactive docs
        # Only reachable when DEBUG=true (backend serves these routes only
        # when the debug flag is set).  Remove in production.
        # ------------------------------------------------------------------
        location /docs {
            # Swagger UI requires inline scripts and styles from cdn.jsdelivr.net.
            # Relax CSP for this development-only path.  This block is never
            # reached in production because DEBUG=false disables the /docs route.
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; connect-src 'self';" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /redoc {
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: https://fastapi.tiangolo.com; connect-src 'self';" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;

            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        location /openapi.json {
            proxy_pass         http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ------------------------------------------------------------------
        # /* — React SPA static files (Phase 8)
        # The frontend service is a placeholder in Phase 1.
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # ------------------------------------------------------------------
        # 429 Too Many Requests — add Retry-After header per RFC 6585.
        # The named location @rate_limited re-emits 429 with the header so
        # clients know how long to wait before retrying.
        # ------------------------------------------------------------------
        error_page 429 @rate_limited;
        location @rate_limited {
            # Nginx child blocks replace (not inherit) the parent's add_header
            # directives.  All security headers must be repeated here so that
            # rate-limited responses satisfy SR-19 alongside Retry-After.
            add_header Retry-After 60 always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Content-Security-Policy "default-src 'self'" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            return 429;
        }

        # ------------------------------------------------------------------
        # Deny access to hidden files (e.g. .env, .git).
        # ------------------------------------------------------------------
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
